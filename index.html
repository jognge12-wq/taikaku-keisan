    --surface2: oklch(0.97 0.005 95);
    --sfc-light: oklch(0.99 0.003 95);
    --border:   oklch(0.92 0.005 95);
    --border2:  oklch(0.88 0.006 95);
    --ink:      oklch(0.22 0.01 95);
    --text:     oklch(0.22 0.01 95);
    --text2:    oklch(0.38 0.01 95);
    --text3:    oklch(0.55 0.008 95);
    --shadow-sm: 0 1px 2px rgba(15,25,20,0.04);
    --shadow:    0 1px 3px rgba(15,25,20,0.05), 0 1px 2px rgba(15,25,20,0.04);
    --shadow-lg: 0 4px 20px rgba(15,25,20,0.06), 0 1px 3px rgba(15,25,20,0.04);
    /* パターン識別色（①〜③のバッジとSVG図の線色） */
    --c1:   oklch(0.48 0.14 255);   --c1bg: oklch(0.96 0.03 255);
    --c2:   oklch(0.52 0.16 140);   --c2bg: oklch(0.96 0.04 140);
    --c3:   oklch(0.56 0.13 60);    --c3bg: oklch(0.96 0.04 70);
    --c4:   oklch(0.50 0.14 295);   --c4bg: oklch(0.96 0.04 295);
    /* 数値/技術フォント — 画面全体で統一する */
    --font-num: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-jp:  'Noto Sans JP', sans-serif;
    --radius: 14px;
    --radius-sm: 10px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --brand:      oklch(0.68 0.18 155);
      --brand-ink:  oklch(0.82 0.14 155);
      --brand-soft: oklch(0.30 0.05 155);
      --brand-line: oklch(0.35 0.05 155);
      --bg:       oklch(0.18 0.005 95);
      --surface:  oklch(0.22 0.006 95);
      --surface2: oklch(0.26 0.007 95);
      --sfc-light: oklch(0.28 0.007 95);
      --border:   oklch(0.30 0.008 95);
      --border2:  oklch(0.27 0.007 95);
      --ink:      oklch(0.95 0.005 95);
      --text:     oklch(0.95 0.005 95);
      --text2:    oklch(0.78 0.006 95);
      --text3:    oklch(0.60 0.008 95);
      --c1:   oklch(0.78 0.13 255);  --c1bg: oklch(0.30 0.06 255);
      --c2:   oklch(0.80 0.15 140);  --c2bg: oklch(0.28 0.06 140);
      --c3:   oklch(0.80 0.12 70);   --c3bg: oklch(0.30 0.06 65);
      --c4:   oklch(0.80 0.13 295);  --c4bg: oklch(0.30 0.06 295);
    }
    body { color-scheme: dark; }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font-jp);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== ヘッダー：surface + 左3pxブランド緑バー ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  .header-icon {
    width: 36px; height: 36px; flex-shrink: 0;
    border-radius: 10px; overflow: hidden;
    box-shadow: var(--shadow-sm);
    display: flex; align-items: center; justify-content: center;
  }
  .header-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .header-title-wrap {
    flex: 1; padding-left: 10px;
    border-left: 3px solid var(--brand);
  }
  header h1 {
    font-size: 15px; font-weight: 700;
    color: var(--ink); letter-spacing: -0.01em;
  }
  header p {
    font-size: 10px; color: var(--text2);
    margin-top: 2px; font-family: var(--font-num); font-variant-numeric: tabular-nums;
  }

  .main { padding: 14px 14px 40px; max-width: 480px; margin: 0 auto; }

  /* ===== 入力カード ===== */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 12px;
  }
  /* カード見出し：左3pxブランド緑バー・横罫で下敷き */
  .card-title {
    display: block;
    padding: 2px 0 10px 10px;
    margin: -2px -4px 12px;
    border-left: 3px solid var(--brand);
    border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.01em;
    text-transform: none;
  }

  .igroup { margin-bottom: 12px; }
  .igroup:last-child { margin-bottom: 0; }
  .ilabel {
    font-size: 11px; color: var(--text2);
    margin-bottom: 5px; display: flex; align-items: center; gap: 6px;
    font-family: var(--font-jp);
  }
  .ilabel-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-x { background: var(--c1); }
  .dot-y { background: var(--c3); }

  /* ===== 入力：ピル型ボーダーレス（ms-hub 流儀） ===== */
  .uwrap { display: flex; align-items: center; gap: 10px; }
  .uwrap input {
    flex: 1; min-width: 0; width: 0;
    font-size: 22px;
    font-family: var(--font-num); font-variant-numeric: tabular-nums;
    font-weight: 500;
    padding: 11px 14px;
    border-radius: 10px;
    border: none;
    background: var(--surface2);
    color: var(--ink);
    outline: none;
    transition: background 0.12s;
    -webkit-appearance: none;
    appearance: none;
  }
  .uwrap input:focus {
    background: var(--sfc-light);
    box-shadow: inset 0 0 0 1px var(--border2);
  }
  .uwrap input::placeholder { color: var(--text3); font-size: 20px; font-weight: 400; }
  .ulabel {
    font-size: 13px; color: var(--text2);
    font-weight: 600; flex-shrink: 0; white-space: nowrap;
    font-family: var(--font-num); font-variant-numeric: tabular-nums;
  }
  .expr-preview {
    font-size: 12px; color: var(--brand);
    font-family: var(--font-num); font-variant-numeric: tabular-nums; font-weight: 500;
    margin-top: 5px; min-height: 16px;
  }
  .expr-hint {
    font-size: 10px; color: var(--text3);
    margin-top: 3px; line-height: 1.5;
    font-family: var(--font-jp);
  }

  /* ===== オフセットボタン（3択 ピル型） ===== */
  .offset-row {
    display: flex; align-items: center;
    gap: 8px; margin-bottom: 10px;
  }
  .offset-row:last-child { margin-bottom: 0; }
  .ax-label { flex-shrink: 0; width: 54px; }
  .ax-tag {
    display: inline-block;
    font-size: 11px; font-weight: 700;
    padding: 3px 9px;
    border-radius: 100px; letter-spacing: 0.02em;
    font-family: var(--font-jp);
  }
  .ax-x { background: var(--c1bg); color: var(--c1); }
  .ax-y { background: var(--c3bg); color: var(--c3); }

  .offset-btns {
    display: flex; gap: 4px;
    flex: 1;
    padding: 4px; background: var(--surface2);
    border-radius: 12px;
  }
  .offset-btn {
    flex: 1; padding: 6px 2px;
    border-radius: 9px;
    border: none;
    background: transparent;
    cursor: pointer;
    transition: background 0.12s, box-shadow 0.12s;
    text-align: center;
    -webkit-appearance: none;
    font-family: var(--font-jp);
  }
  .offset-btn .btn-val {
    display: block;
    font-family: var(--font-num); font-variant-numeric: tabular-nums;
    font-size: 14px; font-weight: 700;
    color: var(--ink);
  }
  .offset-btn .btn-val.is-label {
    font-family: var(--font-jp);
    font-weight: 600;
  }
  .offset-btn .btn-sub {
    display: block;
    font-family: var(--font-num); font-variant-numeric: tabular-nums;
    font-size: 10px; color: var(--text3);
    margin-top: 1px;
  }
  .offset-btn.active {
    background: var(--surface);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .offset-btn.active .btn-val { color: var(--brand); }
  .offset-btn.active .btn-sub { color: var(--brand-ink); }
  .offset-btn:hover .btn-val { color: var(--brand); }
  .offset-btn:active { transform: scale(0.98); }

  /* ===== オフセット図 ===== */
  .offset-diagram {
    margin-top: 14px; display: none;
    padding: 10px; background: var(--surface2);
    border-radius: 10px;
  }
  .offset-diagram.show { display: block; }
  .offset-diagram svg { display: block; margin: 0 auto; overflow: visible; }

  .offset-status {
    margin-top: 10px; padding: 8px 12px;
    background: var(--c4bg); border-radius: 10px;
    font-size: 11px; color: var(--c4); font-weight: 600;
    display: none;
    font-family: var(--font-jp);
  }
  .offset-status.show { display: block; }

  /* ===== クリアボタン：btn-secondary 流儀 ===== */
  .clear-btn {
    width: 100%; padding: 11px;
    font-size: 13px;
    font-family: var(--font-jp);
    color: var(--text2);
    border: none;
    border-radius: 10px;
    background: var(--surface2);
    cursor: pointer;
    margin-bottom: 14px;
    font-weight: 600;
    transition: background 0.12s, transform 0.06s;
    -webkit-appearance: none;
  }
  .clear-btn:hover { background: var(--border); color: var(--ink); }
  .clear-btn:active { transform: scale(0.99); }

  /* ===== 結果カード：角丸18px + shadow-lg の主役カード ===== */
  .results { display: flex; flex-direction: column; gap: 12px; }
  .pat-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    transition: transform 0.1s;
  }
  .pat-card:active { transform: scale(0.99); }
  .pat-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .badge {
    font-size: 11px; font-weight: 700;
    padding: 4px 11px; border-radius: 100px;
    letter-spacing: 0.01em;
    font-family: var(--font-jp);
  }
  .b1 { background: var(--c1bg); color: var(--c1); }
  .b2 { background: var(--c2bg); color: var(--c2); }
  .b3 { background: var(--c3bg); color: var(--c3); }
  .b4 { background: var(--c4bg); color: var(--c4); }
  .pat-sub {
    font-size: 10px; color: var(--text3);
    font-weight: 500;
    font-family: var(--font-num); font-variant-numeric: tabular-nums;
  }
  .pat-body { display: grid; grid-template-columns: 1fr 128px; align-items: center; }
  .vals { padding: 12px 14px; }

  /* 数値は全て Inter + tabular-nums に統一 */
  .main-val {
    font-family: var(--font-num); font-variant-numeric: tabular-nums;
    font-size: 30px; font-weight: 500;
    color: var(--ink);
    line-height: 1; letter-spacing: -0.01em;
  }
  .main-unit {
    font-size: 13px; color: var(--text2);
    margin-left: 4px;
    font-family: var(--font-num); font-variant-numeric: tabular-nums; font-weight: 500;
  }
  .sub-vals { display: flex; gap: 14px; margin-top: 8px; }
  .sub-item {
    font-size: 11px; color: var(--text3);
    font-family: var(--font-num); font-variant-numeric: tabular-nums;
  }
  .sub-item strong {
    color: var(--text2); font-weight: 500;
    font-family: var(--font-num); font-variant-numeric: tabular-nums; font-size: 12px;
  }

  /* ①の寸法表示 */
  .dim-info {
    font-size: 10px; color: var(--text3);
    margin-top: 6px;
    font-family: var(--font-num); font-variant-numeric: tabular-nums;
  }
  .dim-info strong { color: var(--text2); font-weight: 500; }

  /* ②③④の計算内訳 */
  .dim-calc { margin-top: 6px; }
  .calc-row {
    display: flex; align-items: baseline; gap: 3px;
    font-size: 11px; color: var(--text3);
    line-height: 1.8;
    font-family: var(--font-num); font-variant-numeric: tabular-nums;
  }
  .calc-row .ca {
    color: var(--text3); font-weight: 500; min-width: 11px;
  }
  .calc-row .cv {
    font-weight: 500; color: var(--text2);
  }
  .calc-row .co { color: var(--text3); margin: 0 1px; }
  .calc-row .cv-total {
    font-weight: 700; color: var(--ink); font-size: 12px;
  }
  .calc-row .cv-unit {
    font-size: 10px; color: var(--text3); margin-left: 1px;
  }

  .svg-wrap {
    padding: 8px 10px 8px 0;
    display: flex; align-items: center; justify-content: center;
  }
  .hint {
    text-align: center; font-size: 12px;
    color: var(--text3);
    padding: 28px 0 10px; line-height: 1.8;
    font-family: var(--font-jp);
  }

  /* ===== カスタムキーパッド（スマホ用テンキー） ===== */
  #customKP {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface2);
    padding: 6px 6px calc(22px + env(safe-area-inset-bottom, 0px));
    display: none; z-index: 9999;
    box-shadow: 0 -3px 14px rgba(15,25,20,0.12);
    border-top: 1px solid var(--border);
  }
  #customKP .kp-row {
    display: flex; gap: 5px; margin-bottom: 5px; justify-content: center;
  }
  #customKP .kp-row button {
    flex: 1; height: 44px;
    font-size: 20px; font-weight: 500;
    border: none; border-radius: 10px;
    background: var(--surface); color: var(--ink);
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(15,25,20,0.08);
    font-family: var(--font-num); font-variant-numeric: tabular-nums;
    transition: background 0.08s, transform 0.05s;
  }
  #customKP .kp-row button:active {
    background: var(--surface2);
    transform: translateY(1px);
    box-shadow: none;
  }
  #customKP .kp-row button.kp-op {
    background: var(--c1bg); color: var(--c1);
    font-size: 18px;
  }
  #customKP .kp-row button.kp-del {
    background: oklch(0.96 0.03 25); color: var(--c3);
  }
  #customKP .kp-row button.kp-ok {
    background: var(--brand); color: #fff;
    flex: 2; font-size: 16px; font-weight: 700;
    font-family: var(--font-jp);
  }
  #customKP .kp-row button.kp-clr {
    background: var(--surface2); color: var(--text2);
    font-size: 16px;
    font-family: var(--font-jp);
  }
  #customKP .kp-row button.kp-zero { flex: 2; }

</style>
</head>

          <span class="btn-val is-label">なし</span><span class="btn-sub">0mm</span>
        </button>
        <button class="offset-btn" id="oy80" onclick="setOffset('y',80)">
          <span class="btn-val">80mm</span><span class="btn-sub">片側</span>
        </button>
        <button class="offset-btn" id="oy160" onclick="setOffset('y',160)">

<div class="kp-row"><button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button><button data-k="/" class="kp-op">÷</button></div>

<script>

/* オフセット図 */
function makeOffsetDiagram() {
    var el = document.getElementById('offsetDiagram');
    if (!el) return;
    var ox = offsetX, oy = offsetY;
    el.classList.add('show');
    var W = 220, H = 150;
    var padL = 42, padR = 22, padT = 38, padB = 14;
    var rw = W - padL - padR, rh = H - padT - padB;
    var bx = padL, by = padT;
    var fixGap = 18;
    var sox = fixGap, soy = fixGap;
    var c1 = '#1A5FA8', c2 = '#3A7D1E';
    var ov = fixGap + 8;
    var ix = bx + sox, iy = by + soy, iw = rw - sox * 2, ih = rh - soy * 2;
    var xMid = bx + rw / 2;
    var yMid = by + rh / 2;
    var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="100%" style="max-width:360px;overflow:visible" xmlns="http://www.w3.org/2000/svg">';
    s += '<defs><marker id="dArR" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,1 L5,3 L0,5 Z" fill="' + c2 + '"/></marker><marker id="dArL" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto"><path d="M5,1 L0,3 L5,5 Z" fill="' + c2 + '"/></marker></defs>';
    s += '<rect x="' + bx + '" y="' + by + '" width="' + rw + '" height="' + rh + '" fill="' + c1 + '" fill-opacity="0.06" stroke="' + c1 + '" stroke-width="1.8" rx="2"/>';
    var dash = '9 3 2 3';
    s += '<line x1="' + (ix - ov) + '" y1="' + iy + '" x2="' + (ix + iw + ov) + '" y2="' + iy + '" stroke="' + c2 + '" stroke-width="1.4" stroke-dasharray="' + dash + '"/>';
    s += '<line x1="' + (ix - ov) + '" y1="' + (iy + ih) + '" x2="' + (ix + iw + ov) + '" y2="' + (iy + ih) + '" stroke="' + c2 + '" stroke-width="1.4" stroke-dasharray="' + dash + '"/>';
    s += '<line x1="' + ix + '" y1="' + (iy - ov) + '" x2="' + ix + '" y2="' + (iy + ih + ov) + '" stroke="' + c2 + '" stroke-width="1.4" stroke-dasharray="' + dash + '"/>';
    s += '<line x1="' + (ix + iw) + '" y1="' + (iy - ov) + '" x2="' + (ix + iw) + '" y2="' + (iy + ih + ov) + '" stroke="' + c2 + '" stroke-width="1.4" stroke-dasharray="' + dash + '"/>';
    if (ox > 0) {
      var yArr = by - 14;
      if (ox === 160) {
        var rx = bx + rw;
        s += '<line x1="' + bx + '" y1="' + (by - 2) + '" x2="' + bx + '" y2="' + yArr + '" stroke="' + c1 + '" stroke-width="0.7" stroke-dasharray="2 2"/>';
        s += '<line x1="' + ix + '" y1="' + (by - 2) + '" x2="' + ix + '" y2="' + yArr + '" stroke="' + c2 + '" stroke-width="0.7" stroke-dasharray="2 2"/>';
        s += '<line x1="' + (bx + 2) + '" y1="' + yArr + '" x2="' + (ix - 2) + '" y2="' + yArr + '" stroke="' + c2 + '" stroke-width="1.2" marker-start="url(#dArL)" marker-end="url(#dArR)"/>';
        s += '<text x="' + ((bx + ix) / 2) + '" y="' + (yArr - 2) + '" font-size="12" fill="' + c2 + '" text-anchor="middle" font-weight="600">80mm</text>';
        s += '<line x1="' + (ix + iw) + '" y1="' + (by - 2) + '" x2="' + (ix + iw) + '" y2="' + yArr + '" stroke="' + c2 + '" stroke-width="0.7" stroke-dasharray="2 2"/>';
        s += '<line x1="' + rx + '" y1="' + (by - 2) + '" x2="' + rx + '" y2="' + yArr + '" stroke="' + c1 + '" stroke-width="0.7" stroke-dasharray="2 2"/>';
        s += '<line x1="' + (ix + iw + 2) + '" y1="' + yArr + '" x2="' + (rx - 2) + '" y2="' + yArr + '" stroke="' + c2 + '" stroke-width="1.2" marker-start="url(#dArL)" marker-end="url(#dArR)"/>';
        s += '<text x="' + ((ix + iw + rx) / 2) + '" y="' + (yArr - 2) + '" font-size="12" fill="' + c2 + '" text-anchor="middle" font-weight="600">80mm</text>';
        s += '<text x="' + xMid + '" y="' + (yArr - 11) + '" font-size="10" fill="' + c2 + '" text-anchor="middle" opacity="0.8">X両側</text>';
      } else {
        s += '<line x1="' + bx + '" y1="' + (by - 2) + '" x2="' + bx + '" y2="' + yArr + '" stroke="' + c1 + '" stroke-width="0.7" stroke-dasharray="2 2"/>';
        s += '<line x1="' + ix + '" y1="' + (by - 2) + '" x2="' + ix + '" y2="' + yArr + '" stroke="' + c2 + '" stroke-width="0.7" stroke-dasharray="2 2"/>';
        s += '<line x1="' + (bx + 2) + '" y1="' + yArr + '" x2="' + (ix - 2) + '" y2="' + yArr + '" stroke="' + c2 + '" stroke-width="1.2" marker-start="url(#dArL)" marker-end="url(#dArR)"/>';
        s += '<text x="' + ((bx + ix) / 2) + '" y="' + (yArr - 2) + '" font-size="12" fill="' + c2 + '" text-anchor="middle" font-weight="600">' + ox + 'mm</text>';
        s += '<text x="' + xMid + '" y="' + (yArr - 11) + '" font-size="10" fill="' + c2 + '" text-anchor="middle" opacity="0.8">X片側</text>';
      }
    }
    if (oy > 0) {
      var xArr = bx - 14;
      if (oy === 160) {
        var by2 = by + rh;
        s += '<line x1="' + (bx - 2) + '" y1="' + by + '" x2="' + xArr + '" y2="' + by + '" stroke="' + c1 + '" stroke-width="0.7" stroke-dasharray="2 2"/>';
        s += '<line x1="' + (bx - 2) + '" y1="' + iy + '" x2="' + xArr + '" y2="' + iy + '" stroke="' + c2 + '" stroke-width="0.7" stroke-dasharray="2 2"/>';
        s += '<line x1="' + xArr + '" y1="' + (by + 2) + '" x2="' + xArr + '" y2="' + (iy - 2) + '" stroke="' + c2 + '" stroke-width="1.2" marker-start="url(#dArL)" marker-end="url(#dArR)"/>';
        var ym1 = (by + iy) / 2;
        s += '<text x="' + (xArr - 2) + '" y="' + ym1 + '" font-size="12" fill="' + c2 + '" text-anchor="middle" font-weight="600" transform="rotate(-90,' + (xArr - 2) + ',' + ym1 + ')">80mm</text>';
        s += '<line x1="' + (bx - 2) + '" y1="' + (iy + ih) + '" x2="' + xArr + '" y2="' + (iy + ih) + '" stroke="' + c2 + '" stroke-width="0.7" stroke-dasharray="2 2"/>';
        s += '<line x1="' + (bx - 2) + '" y1="' + by2 + '" x2="' + xArr + '" y2="' + by2 + '" stroke="' + c1 + '" stroke-width="0.7" stroke-dasharray="2 2"/>';
        s += '<line x1="' + xArr + '" y1="' + (iy + ih + 2) + '" x2="' + xArr + '" y2="' + (by2 - 2) + '" stroke="' + c2 + '" stroke-width="1.2" marker-start="url(#dArL)" marker-end="url(#dArR)"/>';
        var ym2 = (iy + ih + by2) / 2;
        s += '<text x="' + (xArr - 2) + '" y="' + ym2 + '" font-size="12" fill="' + c2 + '" text-anchor="middle" font-weight="600" transform="rotate(-90,' + (xArr - 2) + ',' + ym2 + ')">80mm</text>';
        s += '<text x="' + (xArr - 11) + '" y="' + yMid + '" font-size="10" fill="' + c2 + '" text-anchor="middle" opacity="0.8" transform="rotate(-90,' + (xArr - 11) + ',' + yMid + ')">Y両側</text>';
      } else {
        s += '<line x1="' + (bx - 2) + '" y1="' + by + '" x2="' + xArr + '" y2="' + by + '" stroke="' + c1 + '" stroke-width="0.7" stroke-dasharray="2 2"/>';
        s += '<line x1="' + (bx - 2) + '" y1="' + iy + '" x2="' + xArr + '" y2="' + iy + '" stroke="' + c2 + '" stroke-width="0.7" stroke-dasharray="2 2"/>';
        s += '<line x1="' + xArr + '" y1="' + (by + 2) + '" x2="' + xArr + '" y2="' + (iy - 2) + '" stroke="' + c2 + '" stroke-width="1.2" marker-start="url(#dArL)" marker-end="url(#dArR)"/>';
        var ym = (by + iy) / 2;
        s += '<text x="' + (xArr - 2) + '" y="' + ym + '" font-size="12" fill="' + c2 + '" text-anchor="middle" font-weight="600" transform="rotate(-90,' + (xArr - 2) + ',' + ym + ')">' + oy + 'mm</text>';
        s += '<text x="' + (xArr - 11) + '" y="' + yMid + '" font-size="10" fill="' + c2 + '" text-anchor="middle" opacity="0.8" transform="rotate(-90,' + (xArr - 11) + ',' + yMid + ')">Y片側</text>';
      }
    }
    s += '</svg>';
    el.innerHTML = s;
  }

/* オフセット状態 */
var offsetX = 0;
var offsetY = 0;

/* なし/80mm/160mm の3択 */
function setOffset(axis, val) {
  if (axis === 'x') {
    offsetX = val;
    document.getElementById('ox0').classList.toggle('active',   val === 0);
    document.getElementById('ox80').classList.toggle('active',  val === 80);
    document.getElementById('ox160').classList.toggle('active', val === 160);
  } else {
    offsetY = val;
    document.getElementById('oy0').classList.toggle('active',   val === 0);
    document.getElementById('oy80').classList.toggle('active',  val === 80);
    document.getElementById('oy160').classList.toggle('active', val === 160);
  }
  updateOffsetStatus();
  calc();
}

function updateOffsetStatus() {
  var hasOffset = offsetX > 0 || offsetY > 0;
  document.getElementById('offsetStatus').classList.toggle('show', hasOffset);
  makeOffsetDiagram();
}

/* 安全な計算式パーサー */
function parseExpr(s) {
  if (!s || !s.trim()) return NaN;
  var clean = s.trim().replace(/[^0-9+\-*\/().\s]/g, '');
  if (!clean) return NaN;
  try {
    var val = Function('"use strict"; return (' + clean + ')')();
    return (typeof val === 'number' && isFinite(val) && val > 0) ? val : NaN;
  } catch(e) { return NaN; }
}

function onInput(axis) {
  var raw = document.getElementById('in' + axis).value;
  var el  = document.getElementById('expr' + axis);
  if (/[+\-*\/()]/.test(raw)) {
    var val = parseExpr(raw);
    el.textContent = isNaN(val) ? '' : '= ' + fmt(val) + ' mm';
  } else {
    el.textContent = '';
  }
  calc();
}

function fmt(n)    { return Math.round(n).toLocaleString(); }
function diag(a,b) { return Math.sqrt(a*a + b*b); }

/* SVG生成 */
function makeSVG(ax, ay, color, ox, oy) {
  var W=128, H=108, pad=22;
  var scale = Math.min((W-pad*2)/ax, (H-pad*2)/ay);
  var rw = ax*scale, rh = ay*scale;
  var bx = (W-rw)/2, by = (H-rh)/2;

  var sox = ox*scale, soy = oy*scale;
  var inner = '';
  if (ox > 0 && rw - sox > 2 && rh - soy > 2) {
    inner = '<rect x="'+(bx+sox/2)+'" y="'+(by+soy/2)+'" width="'+(rw-sox)+'" height="'+(rh-soy)+'" fill="none" stroke="'+color+'" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5" rx="1"/>';
  }
  var dimT = by - 10, dimL = bx - 11;
  return '<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" xmlns="http://www.w3.org/2000/svg">'
    + '<rect x="'+bx+'" y="'+by+'" width="'+rw+'" height="'+rh+'" fill="'+color+'" fill-opacity="0.09" stroke="'+color+'" stroke-width="1.8" rx="2"/>'
    + inner
    + '<line x1="'+bx+'" y1="'+by+'" x2="'+(bx+rw)+'" y2="'+(by+rh)+'" stroke="'+color+'" stroke-width="2" stroke-dasharray="5 3"/>'
    + '<line x1="'+bx+'" y1="'+dimT+'" x2="'+(bx+rw)+'" y2="'+dimT+'" stroke="'+color+'" stroke-width="0.8"/>'
    + '<line x1="'+bx+'" y1="'+(dimT-3)+'" x2="'+bx+'" y2="'+(dimT+3)+'" stroke="'+color+'" stroke-width="0.8"/>'
    + '<line x1="'+(bx+rw)+'" y1="'+(dimT-3)+'" x2="'+(bx+rw)+'" y2="'+(dimT+3)+'" stroke="'+color+'" stroke-width="0.8"/>'
    + '<text x="'+((bx*2+rw)/2)+'" y="'+(dimT-3)+'" font-size="10" fill="'+color+'" text-anchor="middle">'+fmt(ax)+'</text>'
    + '<line x1="'+dimL+'" y1="'+by+'" x2="'+dimL+'" y2="'+(by+rh)+'" stroke="'+color+'" stroke-width="0.8"/>'
    + '<line x1="'+(dimL-3)+'" y1="'+by+'" x2="'+(dimL+3)+'" y2="'+by+'" stroke="'+color+'" stroke-width="0.8"/>'
    + '<line x1="'+(dimL-3)+'" y1="'+(by+rh)+'" x2="'+(dimL+3)+'" y2="'+(by+rh)+'" stroke="'+color+'" stroke-width="0.8"/>'
    + '<text x="'+(dimL-4)+'" y="'+((by*2+rh)/2+3)+'" font-size="10" fill="'+color+'" text-anchor="middle" transform="rotate(-90 '+(dimL-4)+' '+((by*2+rh)/2+3)+')">'+fmt(ay)+'</text>'
    + '</svg>';
}

/*
 * makeCard(badge, label, sub, ax, ay, color, svgOx, svgOy, dispOffX, dispOffY)
 *   ax, ay       : 対角計算に使う実際の寸法（オフセット込み）
 *   svgOx, svgOy : SVG内の内枠描画用オフセット（片側）
 *   dispOffX/Y   : 計算内訳表示用オフセット（合計値）
 *                  両方0なら内訳なし、それ以外は「入力値 + Omm = 合計」を2行表示
 */
function makeCard(badge, label, sub, ax, ay, color, svgOx, svgOy, dispOffX, dispOffY) {
  dispOffX = dispOffX || 0;
  dispOffY = dispOffY || 0;
  var d = diag(ax, ay);
  var card = document.createElement('div');
  card.className = 'pat-card';

  var dimHtml;
  if (dispOffX === 0 && dispOffY === 0) {
    /* ①：内訳なし（シンプル表示） */
    dimHtml = '<div class="dim-info">X:<strong>' + fmt(ax) + '</strong> / Y:<strong>' + fmt(ay) + '</strong></div>';
  } else {
    /* ②③④：入力値 + オフセット = 合計 を2行で表示 */
    var baseX = ax - dispOffX;
    var baseY = ay - dispOffY;
    dimHtml = '<div class="dim-calc">'
      + '<div class="calc-row">'
        + '<span class="ca">X</span>'
        + '<span class="cv">' + fmt(baseX) + '</span>'
        + '<span class="co">+</span>'
        + '<span class="cv">' + fmt(dispOffX) + '</span>'
        + '<span class="co">=</span>'
        + '<span class="cv-total">' + fmt(ax) + '</span>'
        + '<span class="cv-unit">mm</span>'
      + '</div>'
      + '<div class="calc-row">'
        + '<span class="ca">Y</span>'
        + '<span class="cv">' + fmt(baseY) + '</span>'
        + '<span class="co">+</span>'
        + '<span class="cv">' + fmt(dispOffY) + '</span>'
        + '<span class="co">=</span>'
        + '<span class="cv-total">' + fmt(ay) + '</span>'
        + '<span class="cv-unit">mm</span>'
      + '</div>'
    + '</div>';
  }

  card.innerHTML =
    '<div class="pat-head">'
      + '<span class="badge ' + badge + '">' + label + '</span>'
      + '<span class="pat-sub">' + sub + '</span>'
    + '</div>'
    + '<div class="pat-body">'
      + '<div class="vals">'
        + '<div><span class="main-val">' + fmt(d) + '</span><span class="main-unit">mm</span></div>'
        + '<div class="sub-vals">'
          + '<div class="sub-item"><strong>' + (d/1000).toFixed(3) + '</strong> m</div>'
          + '<div class="sub-item"><strong>' + (d/303.03).toFixed(2) + '</strong> 尺</div>'
        + '</div>'
        + dimHtml
      + '</div>'
      + '<div class="svg-wrap">' + makeSVG(ax, ay, color, svgOx, svgOy) + '</div>'
    + '</div>';
  return card;
}

/* メイン計算 */
function calc() {
  var x = parseExpr(document.getElementById('inX').value);
  var y = parseExpr(document.getElementById('inY').value);
  var res  = document.getElementById('results');
  var hint = document.getElementById('hint');

  if (isNaN(x) || isNaN(y) || x <= 0 || y <= 0) {
    res.innerHTML = '';
    hint.style.display = '';
    return;
  }
  hint.style.display = 'none';
  res.innerHTML = '';

  /* ①②③ は常に80mm固定で表示 */
  res.appendChild(makeCard('b1', '① 通り芯〜通り芯', 'オフセットなし',        x,      y,      '#1A5FA8', 0,  0,  0,   0));
  res.appendChild(makeCard('b2', '② 型枠面〜型枠面', 'X:+160mm / Y:+160mm', x+160,  y+160,  '#3A7D1E', 80, 80, 160, 160));

  /* ③：オフセットが設定されている場合のみ表示 */
  var show3 = offsetX > 0 || offsetY > 0;
  if (show3) {
    var ax4   = x + offsetX;
    var ay4   = y + offsetY;
    var subX4 = '+' + fmt(offsetX) + 'mm';
    var subY4 = '+' + fmt(offsetY) + 'mm';
    res.appendChild(makeCard('b3', '③ 調整後', 'X:' + subX4 + ' / Y:' + subY4,
      ax4, ay4, '#A06010', offsetX, offsetY, offsetX, offsetY));
  }
}

/* クリア */
function clearAll() {
  document.getElementById('inX').value = '';
  document.getElementById('inY').value = '';
  document.getElementById('exprX').textContent = '';
  document.getElementById('exprY').textContent = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('hint').style.display = '';
  document.getElementById('inX').focus();
}
  makeOffsetDiagram();

(function(){
function isTouch(){return ("ontouchstart" in window)||navigator.maxTouchPoints>0;}
var kp=document.getElementById("customKP");
var _el=null;
function showKP(el){_el=el;kp.style.display="block";setTimeout(function(){el.scrollIntoView({behavior:"smooth",block:"center"});},150);}
function hideKP(){kp.style.display="none";_el=null;}
function kpPress(k){
if(!_el)return;
var el=_el,cs=el.selectionStart,ce=el.selectionEnd,v=el.value;
if(k==="BS"){if(cs===ce&&cs>0){el.value=v.slice(0,cs-1)+v.slice(cs);el.setSelectionRange(cs-1,cs-1);}else{el.value=v.slice(0,cs)+v.slice(ce);el.setSelectionRange(cs,cs);}}
else if(k==="C"){el.value="";}
else{el.value=v.slice(0,cs)+k+v.slice(ce);el.setSelectionRange(cs+1,cs+1);}
el.dispatchEvent(new Event("input",{bubbles:true}));
}
if(kp){
kp.querySelectorAll("button[data-k]").forEach(function(btn){
btn.addEventListener("mousedown",function(e){e.preventDefault();var k=btn.getAttribute("data-k");if(k==="OK")hideKP();else kpPress(k);});
btn.addEventListener("touchstart",function(e){e.preventDefault();var k=btn.getAttribute("data-k");if(k==="OK")hideKP();else kpPress(k);},{passive:false});
});
}
if(isTouch()){
["inX","inY"].forEach(function(id){
var el=document.getElementById(id);
if(!el)return;
el.setAttribute("inputmode","none");
el.addEventListener("focus",function(){showKP(el);});
});
document.addEventListener("touchstart",function(e){
